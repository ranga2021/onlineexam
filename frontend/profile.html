<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  min-height: 100vh;
  background:
    linear-gradient(
      rgba(85, 90, 108, 0.8),
      rgba(105, 93, 116, 0.2)
    ),
    url("assets/bg_online_exam");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}
/* Privacy page navbar text override */
body .navbar .nav-link,
body .navbar .navbar-brand,
body .navbar .dropdown-toggle {
  color: #ffffff !important;
}

/* Optional: dropdown items stay readable */
body .navbar .dropdown-menu .dropdown-item {
  color: #000 !important;
}


.profile-card {
  max-width: 500px;
  margin: 120px auto 40px;
  background: #fff;
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  text-align: center;
}

.profile-avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #dee2e6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin: 0 auto 15px;
}

.profile-card h4 {
  font-weight: 700;
  margin-bottom: 6px;
}

.profile-card p {
  margin-bottom: 8px;
  color: #555;
}

.badge-guest {
  background: #6c757d;
}

.badge-admin {
  background: #0173BA;
}

.notice {
  background: #f8f9fa;
  border-left: 4px solid #0d6efd;
  padding: 14px;
  border-radius: 8px;
  font-size: 14px;
  margin-top: 20px;
  color: #333;
}

/* FOOTER */
.footer {
  background: #f8f9fc;
  border-top: 1px solid #e5e7eb;
}
/* Disable fixed navbar ONLY on selected pages */
.no-fixed-navbar .navbar {
  position: static !important;
}

</style>
</head>

<body class="no-fixed-navbar">

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- PROFILE -->
<div class="profile-card">

  <!-- AVATAR -->
  <div class="profile-avatar" id="avatarIcon">ЁЯСд</div>

  <!-- USER INFO -->
  <h4 id="profileName">Guest User</h4>
  <span id="profileBadge" class="badge badge-guest mb-2">Guest</span>

  <p class="mt-3"><strong>Email:</strong> <span id="emailText">Not available</span></p>
  <p><strong>Account Type:</strong> <span id="accountType">Temporary Guest</span></p>

  <!-- NOTICE -->
  <div class="notice" id="profileNotice">
    тЪая╕П You are currently using the system as a <strong>Guest</strong>.<br>
    To save exam history, track progress, and access full features,
    <strong>registration and login will be required</strong>.
  </div>

</div>

<!-- NAVBAR LOAD -->
<script>
fetch("/Nav")
  .then(res => res.text())
  .then(data => document.getElementById("navbar").innerHTML = data);
</script>

<!-- PROFILE LOGIC -->
<script>
const role = localStorage.getItem("role");

if (role === "admin") {
  document.getElementById("avatarIcon").textContent = "ЁЯЫбя╕П";
  document.getElementById("profileName").textContent = "Admin User";
  document.getElementById("profileBadge").textContent = "Admin";
  document.getElementById("profileBadge").classList.remove("badge-guest");
  document.getElementById("profileBadge").classList.add("badge-admin");

  document.getElementById("emailText").textContent = "admin@system.local";
  document.getElementById("accountType").textContent = "System Administrator";

  document.getElementById("profileNotice").innerHTML = `
    ЁЯЫая╕П You are logged in as an <strong>Administrator</strong>.<br>
    You have full access to exam scheduling, exam management,
    analytics, and user attempts.
  `;
}

function logout() {
  localStorage.clear();
  window.location.href = "/Home";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SUPPORT CTA -->
<div id="supportCTA"></div>
<script>
fetch("components/support-cta")
  .then(res => res.text())
  .then(html => {
    document.getElementById("supportCTA").innerHTML = html;
  });
</script>

<!-- FOOTER -->
<div id="footer"></div>
<script>
fetch("components/footer")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);
</script>
<script>
fetch("/Nav")
  .then(res => res.text())
  .then(html => {
    document.getElementById("navbar").innerHTML = html;
    applyNavbarAuth();   // тЬЕ IMPORTANT
  });

function applyNavbarAuth() {
  const role = localStorage.getItem("role");

  const adminMenu = document.getElementById("adminMenu");
  const loginLink = document.getElementById("loginLink");
  const logoutBtn = document.getElementById("logoutBtn");

  if (role === "admin") {
    adminMenu?.classList.remove("d-none");
    loginLink?.classList.add("d-none");
    logoutBtn?.classList.remove("d-none");
  }
}
</script>

</body>
</html>
