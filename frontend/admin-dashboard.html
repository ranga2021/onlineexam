<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Exam Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box}
body{background:#f1f5f9;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#0f172a;min-height:100vh}
.page-header{padding:32px 0 24px}
.page-header h1{font-size:28px;font-weight:700;color:#0f172a;margin-bottom:4px}
.page-header p{color:#64748b;font-size:15px;margin:0}
.stat-card{background:#fff;border-radius:14px;padding:24px;border:1px solid #e2e8f0;transition:box-shadow .2s}
.stat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
.stat-icon.blue{background:#eff6ff;color:#2563eb}
.stat-icon.green{background:#f0fdf4;color:#16a34a}
.stat-icon.amber{background:#fffbeb;color:#d97706}
.stat-icon.purple{background:#faf5ff;color:#7c3aed}
.stat-value{font-size:28px;font-weight:700;color:#0f172a;line-height:1}
.stat-label{font-size:13px;color:#64748b;margin-top:4px;font-weight:500}
.chart-card{background:#fff;border-radius:14px;padding:28px;border:1px solid #e2e8f0}
.chart-card h5{font-size:16px;font-weight:600;color:#0f172a;margin-bottom:20px}
.chart-wrap{height:280px}
</style>
</head>
<body>

<div id="navbar"></div>

<div class="container">
  <div class="page-header">
    <h1>Dashboard</h1>
    <p>Overview of your examination system</p>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon blue"><i class="bi bi-journal-text"></i></div>
        <div class="stat-value" id="totalExams">0</div>
        <div class="stat-label">Total Exams</div>
      </div>
    </div>
    <div class="col-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon green"><i class="bi bi-people"></i></div>
        <div class="stat-value" id="totalAttempts">0</div>
        <div class="stat-label">Total Attempts</div>
      </div>
    </div>
    <div class="col-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon amber"><i class="bi bi-graph-up"></i></div>
        <div class="stat-value" id="avgScore">0</div>
        <div class="stat-label">Average Score</div>
      </div>
    </div>
    <div class="col-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon purple"><i class="bi bi-clock-history"></i></div>
        <div class="stat-value" id="latestExam" style="font-size:15px;line-height:1.3">-</div>
        <div class="stat-label">Latest Exam</div>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-5">
    <div class="col-lg-6">
      <div class="chart-card">
        <h5>Attempts per Exam</h5>
        <div class="chart-wrap"><canvas id="attemptChart"></canvas></div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="chart-card">
        <h5>Score Distribution</h5>
        <div class="chart-wrap"><canvas id="scoreChart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (localStorage.getItem("role") !== "admin") {
  window.location.href = "/admin";
}

fetch("/Nav")
  .then(r => r.text())
  .then(h => {
    document.getElementById("navbar").innerHTML = h;
    document.getElementById("adminMenu")?.classList.remove("d-none");
    document.getElementById("logoutBtn")?.classList.remove("d-none");
  });

function logout() {
  localStorage.clear();
  window.location.href = "/admin";
}

fetch("/api/admin/analytics")
  .then(r => r.json())
  .then(data => {
    document.getElementById("totalExams").textContent = data.summary.totalExams;
    document.getElementById("totalAttempts").textContent = data.summary.totalAttempts;
    document.getElementById("avgScore").textContent = data.summary.avgScore ?? 0;
    document.getElementById("latestExam").textContent = data.summary.latestExam ?? "-";

    new Chart(document.getElementById("attemptChart"), {
      type: "bar",
      data: {
        labels: data.attemptsPerExam.map(e => e.exam_name),
        datasets: [{
          label: "Attempts",
          data: data.attemptsPerExam.map(e => e.attempts),
          backgroundColor: "#3b82f6",
          borderRadius: 6,
          barThickness: 32
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, grid: { color: "#f1f5f9" } },
          x: { grid: { display: false } }
        }
      }
    });

    const scoreLabels = data.scoreDist.map(s => `Score ${s.score}`);
    const scoreValues = data.scoreDist.map(s => s.count);
    const colors = ["#ef4444","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899","#06b6d4"];

    new Chart(document.getElementById("scoreChart"), {
      type: "doughnut",
      data: {
        labels: scoreLabels,
        datasets: [{
          data: scoreValues,
          backgroundColor: colors.slice(0, scoreValues.length),
          borderWidth: 0,
          spacing: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: "65%",
        plugins: {
          legend: { position: "bottom", labels: { padding: 16, usePointStyle: true, pointStyle: "circle" } }
        }
      }
    });
  });
</script>
</body>
</html>
